---
- name: Setup Bastion host (Nginx proxy for Grafana and Kibana)
  hosts: bastion
  become: yes
  gather_facts: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create Nginx config for proxy (Grafana and Kibana only)
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          # Прокси для Grafana
          server {
              listen 3000;
              server_name _;
              location / {
                  proxy_pass http://{{ grafana_private_ip }}:3000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }

          # Прокси для Kibana
          server {
              listen 5601;
              server_name _;
              location / {
                  proxy_pass http://{{ kibana_private_ip }}:5601;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }

          # Отключаем дефолтный сервер на 80 (веб-трафик идёт через ALB)
          server {
              listen 80 default_server;
              server_name _;
              return 444;
          }
      notify: restart nginx

    - name: Ensure Nginx is running
      systemd:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      systemd:
        name: nginx
        state: restarted