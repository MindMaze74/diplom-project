---
- name: Setup web servers
  hosts: web
  become: yes
  tasks:
    # ----- Подготовка каталогов для Nginx (Docker) -----
    - name: Ensure nginx directories exist
      file:
        path: "/opt/nginx/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - html
        - logs
        - conf.d

    # ----- Настройка страницы статуса Nginx (/nginx_status) -----
    - name: Deploy nginx status configuration
      copy:
        dest: /opt/nginx/conf.d/status.conf
        content: |
          location /nginx_status {
              stub_status on;
              allow 127.0.0.1;
              allow ::1;
              deny all;
          }
      notify: restart nginx_container

    # ----- Node Exporter -----
    - name: Download Node Exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Extract Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp
        remote_src: yes
        creates: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter

    - name: Install Node Exporter binary
      copy:
        src: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: 0755
        remote_src: yes

    - name: Create node_exporter user
      user:
        name: node_exporter
        system: yes
        shell: /bin/false
        create_home: no

    - name: Create Node Exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target
      notify: restart node_exporter

    - name: Start and enable Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    # ----- prometheus-nginxlog-exporter (метрики из логов Nginx) -----
    - name: Download prometheus-nginxlog-exporter DEB package
      get_url:
        url: https://github.com/martin-helmich/prometheus-nginxlog-exporter/releases/download/v1.9.2/prometheus-nginxlog-exporter_1.9.2_linux_amd64.deb
        dest: /tmp/nginxlog-exporter.deb

    - name: Install prometheus-nginxlog-exporter
      apt:
        deb: /tmp/nginxlog-exporter.deb

    - name: Create prometheus-nginxlog-exporter configuration
      copy:
        dest: /etc/prometheus-nginxlog-exporter.hcl
        content: |
          listen {
              port = 4040
              address = "0.0.0.0"
          }

          namespace "nginx" {
              format = "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent \"$http_referer\" \"$http_user_agent\""
              source_files = ["/opt/nginx/logs/access.log"]
          }
      notify: restart nginxlog_exporter

    - name: Start and enable prometheus-nginxlog-exporter
      systemd:
        name: prometheus-nginxlog-exporter
        state: started
        enabled: yes
        daemon_reload: yes

    # ----- Filebeat (отправка логов в Elasticsearch) -----
    - name: Add Elastic repository key
      apt_key:
        url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        state: present
      ignore_errors: yes
      register: elastic_key_result

    - name: Add Elastic repository
      apt_repository:
        repo: "deb https://artifacts.elastic.co/packages/7.x/apt stable main"
        state: present
        update_cache: yes
      when: elastic_key_result is success
      ignore_errors: yes
      register: elastic_repo_result

    - name: Install Filebeat
      apt:
        name: filebeat
        state: present
        update_cache: yes
      when: elastic_repo_result is success
      ignore_errors: yes

    - name: Deploy Filebeat configuration
      copy:
        dest: /etc/filebeat/filebeat.yml
        content: |
          filebeat.inputs:
          - type: log
            enabled: true
            paths:
              - /opt/nginx/logs/access.log
            fields:
              log_type: nginx_access
            json.keys_under_root: true
            json.overwrite_keys: true

          - type: log
            enabled: true
            paths:
              - /opt/nginx/logs/error.log
            fields:
              log_type: nginx_error

          output.elasticsearch:
            hosts: ["{{ elasticsearch_private_ip }}:9200"]
            indices:
              - index: "nginx-logs-%{+yyyy.MM.dd}"
                when.contains:
                  fields.log_type: "nginx_access"
              - index: "nginx-error-logs-%{+yyyy.MM.dd}"
                when.contains:
                  fields.log_type: "nginx_error"

          setup.template.name: "nginx-logs"
          setup.template.pattern: "nginx-logs-*"
      when: elastic_repo_result is success and elastic_key_result is success
      notify: restart filebeat

    - name: Start and enable Filebeat
      systemd:
        name: filebeat
        state: started
        enabled: yes
      when: elastic_repo_result is success and elastic_key_result is success
      ignore_errors: yes

  handlers:
    - name: restart nginx_container
      docker_container:
        name: nginx
        state: restarted
      ignore_errors: yes

    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
        daemon_reload: yes

    - name: restart nginxlog_exporter
      systemd:
        name: prometheus-nginxlog-exporter
        state: restarted
        daemon_reload: yes

    - name: restart filebeat
      systemd:
        name: filebeat
        state: restarted
        daemon_reload: yes