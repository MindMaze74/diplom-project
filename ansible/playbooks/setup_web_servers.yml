---
- name: Setup web servers
  hosts: web
  become: yes
  tasks:
    # ----- установка nginx и сайта
    # Например:
    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Ensure nginx is running
      systemd:
        name: nginx
        state: started
        enabled: yes

    # ----- Node Exporter -----
    - name: Download Node Exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Extract Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp
        remote_src: yes
        creates: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter

    - name: Install Node Exporter binary
      copy:
        src: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: 0755
        remote_src: yes

    - name: Create node_exporter user
      user:
        name: node_exporter
        system: yes
        shell: /bin/false
        create_home: no

    - name: Create Node Exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target
      notify: restart node_exporter

    - name: Start and enable Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    # ----- Nginx Exporter -----
    - name: Download Nginx Exporter
      get_url:
        url: https://github.com/nginxinc/nginx-prometheus-exporter/releases/download/v1.0.0/nginx-prometheus-exporter-1.0.0-linux-amd64.tar.gz
        dest: /tmp/nginx_exporter.tar.gz

    - name: Extract Nginx Exporter
      unarchive:
        src: /tmp/nginx_exporter.tar.gz
        dest: /tmp
        remote_src: yes
        creates: /tmp/nginx-prometheus-exporter

    - name: Install Nginx Exporter binary
      copy:
        src: /tmp/nginx-prometheus-exporter
        dest: /usr/local/bin/nginx-prometheus-exporter
        mode: 0755
        remote_src: yes

    - name: Create nginx_exporter user
      user:
        name: nginx_exporter
        system: yes
        shell: /bin/false

    - name: Create Nginx Exporter systemd service
      copy:
        dest: /etc/systemd/system/nginx_exporter.service
        content: |
          [Unit]
          Description=Nginx Prometheus Exporter
          After=network.target

          [Service]
          User=nginx_exporter
          Group=nginx_exporter
          Type=simple
          ExecStart=/usr/local/bin/nginx-prometheus-exporter -nginx.scrape-uri http://localhost/nginx_status
          Restart=always

          [Install]
          WantedBy=multi-user.target
      notify: restart nginx_exporter

    - name: Start and enable Nginx Exporter
      systemd:
        name: nginx_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    # ----- Filebeat -----
    - name: Add Elastic repository key
      apt_key:
        url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        state: present

    - name: Add Elastic repository
      apt_repository:
        repo: "deb https://artifacts.elastic.co/packages/7.x/apt stable main"
        state: present
        update_cache: yes

    - name: Install Filebeat
      apt:
        name: filebeat
        state: present
        update_cache: yes

    - name: Deploy Filebeat configuration
      copy:
        dest: /etc/filebeat/filebeat.yml
        content: |
          filebeat.inputs:
          - type: log
            enabled: true
            paths:
              - /var/log/nginx/access.log
            fields:
              log_type: nginx_access
            json.keys_under_root: true
            json.overwrite_keys: true

          - type: log
            enabled: true
            paths:
              - /var/log/nginx/error.log
            fields:
              log_type: nginx_error

          output.elasticsearch:
            hosts: ["{{ elasticsearch_private_ip }}:9200"]
            indices:
              - index: "nginx-logs-%{+yyyy.MM.dd}"
                when.contains:
                  fields.log_type: "nginx_access"
              - index: "nginx-error-logs-%{+yyyy.MM.dd}"
                when.contains:
                  fields.log_type: "nginx_error"

          setup.template.name: "nginx-logs"
          setup.template.pattern: "nginx-logs-*"
      notify: restart filebeat

    - name: Start and enable Filebeat
      systemd:
        name: filebeat
        state: started
        enabled: yes

  handlers:
    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
        daemon_reload: yes

    - name: restart nginx_exporter
      systemd:
        name: nginx_exporter
        state: restarted
        daemon_reload: yes

    - name: restart filebeat
      systemd:
        name: filebeat
        state: restarted
        daemon_reload: yes